services:
  postgres:
    image: postgres:16
    container_name: property-pipeline-postgres
    environment:
      POSTGRES_DB: property_pipeline
      POSTGRES_USER: pipeline_user
      POSTGRES_PASSWORD: pipeline_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline_user -d property_pipeline"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
